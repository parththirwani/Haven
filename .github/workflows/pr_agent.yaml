name: PR-Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]  # CRITICAL: only fire on new comments, not edits/deletions

permissions:
  issues: write
  pull-requests: write
  contents: write   # needed for update_changelog and reading PR file contents

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: PR-Agent
    # CRITICAL: Must handle BOTH pull_request events AND issue_comment events.
    # The original condition only blocked bots, but didn't properly gate
    # issue_comment events. We need separate handling per event type.
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.action == 'created' &&
       github.event.sender.type != 'Bot' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/'))
    steps:
      - name: PR Agent action step
        uses: Codium-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- AI Provider credentials ---
          # Key name matches [openai] key = "" in .secrets_template.toml
          OPENAI__KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI__API_BASE: ${{ secrets.OPENAI_API_BASE }}

          # --- Model configuration ---
          # Use double underscore __ for nested dynaconf keys via env vars
          CONFIG__MODEL: ${{ secrets.CONFIG_MODEL }}
          CONFIG__MODEL_REASONING: ${{ secrets.CONFIG_MODEL }}
          # CRITICAL FIX: Was "[]" string — must be valid TOML/JSON list notation
          # An empty list means no fallback; if your model fails, there's no recovery.
          # Recommended: remove this line entirely to use defaults, OR specify a real fallback.
          # CONFIG__FALLBACK_MODELS: '["gpt-4o-mini"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "8000"
          CONFIG__AI_TIMEOUT: "480"

          # --- GitHub Action auto-triggers (only apply to pull_request events) ---
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "false"

          # --- Reviewer settings ---
          PR_REVIEWER__NUM_MAX_FINDINGS: "3"
          PR_REVIEWER__REQUIRE_TESTS_REVIEW: "false"
          PR_REVIEWER__REQUIRE_SECURITY_REVIEW: "false"
          PR_REVIEWER__ENABLE_REVIEW_LABELS_EFFORT: "true"
          PR_REVIEWER__PERSISTENT_COMMENT: "true"

          # --- Description settings ---
          PR_DESCRIPTION__PUBLISH_LABELS: "false"
          PR_DESCRIPTION__FINAL_UPDATE_MESSAGE: "false"
          PR_DESCRIPTION__ENABLE_PR_DIAGRAM: "false"

          # --- Code suggestions settings ---
          PR_CODE_SUGGESTIONS__MAX_NUMBER_OF_CALLS: "1"
          PR_CODE_SUGGESTIONS__PARALLEL_CALLS: "false"
          PR_CODE_SUGGESTIONS__FOCUS_ONLY_ON_PROBLEMS: "true"
          PR_CODE_SUGGESTIONS__NUM_CODE_SUGGESTIONS_PER_CHUNK: "4"
          PR_CODE_SUGGESTIONS__PERSISTENT_COMMENT: "true"