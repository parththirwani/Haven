name: PR-Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: PR-Agent Auto Review
    # Allow both human-triggered events AND issue comments (slash commands)
    # Exclude bot-originated pull_request events, but allow bot comments would be filtered by pr-agent itself
    if: >
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      (github.event_name == 'pull_request' && github.event.sender.type != 'Bot')

    steps:
      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          # ── GitHub Auth ────────────────────────────────────────────────
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── API Key — must be set in ALL three forms ───────────────────
          # Form 1: plain env var (used by the action entrypoint & litellm)
          OPENAI_API_KEY:  ${{ secrets.OPENAI_KEY }}
          # Form 2: Dynaconf dot-notation (used by get_settings().openai.key)
          OPENAI.KEY:      ${{ secrets.OPENAI_KEY }}
          # Form 3: Dynaconf double-underscore env var form
          OPENAI__KEY:     ${{ secrets.OPENAI_KEY }}

          # ── API Base — set in both forms ───────────────────────────────
          OPENAI_API_BASE:  ${{ secrets.OPENAI_API_BASE }}
          OPENAI.API_BASE:  ${{ secrets.OPENAI_API_BASE }}
          OPENAI__API_BASE: ${{ secrets.OPENAI_API_BASE }}

          # ── Model config ───────────────────────────────────────────────
          CONFIG.MODEL:                   ${{ secrets.CONFIG_MODEL }}
          CONFIG.MODEL_REASONING:         ${{ secrets.CONFIG_MODEL }}
          CONFIG.FALLBACK_MODELS:         "[]"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "8000"
          CONFIG.AI_TIMEOUT:              "480"

          # ── Auto-triggers ──────────────────────────────────────────────
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG.AUTO_REVIEW:   "true"
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE:  "false"

          # ── Reviewer ───────────────────────────────────────────────────
          PR_REVIEWER.NUM_MAX_FINDINGS:               "3"
          PR_REVIEWER.REQUIRE_TESTS_REVIEW:           "false"
          PR_REVIEWER.REQUIRE_SECURITY_REVIEW:        "false"
          PR_REVIEWER.REQUIRE_TICKET_ANALYSIS_REVIEW: "false"
          PR_REVIEWER.ENABLE_REVIEW_LABELS_EFFORT:    "true"
          PR_REVIEWER.ENABLE_AUTO_APPROVAL:           "false"
          PR_REVIEWER.PERSISTENT_COMMENT:             "true"

          # ── Description ────────────────────────────────────────────────
          PR_DESCRIPTION.PUBLISH_LABELS:           "false"
          PR_DESCRIPTION.FINAL_UPDATE_MESSAGE:     "false"
          PR_DESCRIPTION.ENABLE_PR_DIAGRAM:        "false"
          PR_DESCRIPTION.ENABLE_LARGE_PR_HANDLING: "false"
          PR_DESCRIPTION.MAX_AI_CALLS:             "1"

          # ── Code Suggestions ───────────────────────────────────────────
          PR_CODE_SUGGESTIONS.MAX_NUMBER_OF_CALLS:            "1"
          PR_CODE_SUGGESTIONS.PARALLEL_CALLS:                 "false"
          PR_CODE_SUGGESTIONS.FOCUS_ONLY_ON_PROBLEMS:         "true"
          PR_CODE_SUGGESTIONS.NUM_CODE_SUGGESTIONS_PER_CHUNK: "4"
          PR_CODE_SUGGESTIONS.PERSISTENT_COMMENT:             "true"