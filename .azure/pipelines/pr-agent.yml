trigger: none

pr:
  branches:
    include:
      - main
      - master
      - '*'

pool:
  vmImage: ubuntu-latest

variables:
  OPENAI_API_KEY: $(OPENAI_KEY)
  OPENAI_API_BASE: $(OPENAI_API_BASE)
  OPENAI_API_TYPE: azure
  OPENAI_API_VERSION: "2024-10-21"

steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - script: pip install pr-agent
    displayName: 'Install PR Agent'

  - script: |
      # Build correct Azure DevOps PR URL
      PR_URL="${SYSTEM_COLLECTIONURI}${SYSTEM_TEAMPROJECT}/_git/${BUILD_REPOSITORY_NAME}/pullrequest/${SYSTEM_PULLREQUEST_PULLREQUESTID}"

      echo "PR URL: $PR_URL"
      echo "Using model: bodh/b0"

      # Tell PR-Agent it's running on Azure DevOps
      export config__git_provider="azure"
      export azure_devops__org="${SYSTEM_COLLECTIONURI}"

      # Run the three commands
      python -m pr_agent.cli --pr_url="$PR_URL" describe
      python -m pr_agent.cli --pr_url="$PR_URL" review
      python -m pr_agent.cli --pr_url="$PR_URL" improve
    displayName: 'Run PR Agent (Describe + Review + Improve)'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    env:
      OPENAI_API_KEY: $(OPENAI_API_KEY)
      OPENAI_API_BASE: $(OPENAI_API_BASE)
      OPENAI_API_TYPE: azure
      OPENAI_API_VERSION: $(OPENAI_API_VERSION)
      CONFIG__MODEL: "bodh/b0"
      GITHUB_TOKEN: $(GITHUB_TOKEN)        # sometimes still needed