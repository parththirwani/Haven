trigger: none

pr:
  branches:
    include:
      - dev  # Change this to your target branch

stages:
- stage: pr_agent
  displayName: 'PR Agent'
  jobs:
  - job: pr_agent_job
    displayName: 'Run PR Agent'
    pool:
      name: 'my-linux'  # Your self-hosted agent pool name
    container:
      image: codiumai/pr-agent:latest
      options: --entrypoint ""
    variables:
      - group: pr-agent-secrets  # Library variable group containing OPENAI_KEY and OPENAI_API_BASE

    steps:
    - script: |
        echo "Running PR Agent on Azure DevOps"

        # Build PR URL using Azure DevOps built-in variables
        PR_URL="${SYSTEM_COLLECTIONURI}${SYSTEM_TEAMPROJECT}/_git/${BUILD_REPOSITORY_NAME}/pullrequest/${SYSTEM_PULLREQUEST_PULLREQUESTID}"
        echo "PR_URL: $PR_URL"

        # Tell PR Agent to use Azure DevOps as the git provider
        export config__git_provider="azure"
        export azure_devops__org="${SYSTEM_COLLECTIONURI}"

        echo "=== Running describe ==="
        pr-agent --pr_url="$PR_URL" describe

        echo "=== Running review ==="
        pr-agent --pr_url="$PR_URL" review

        echo "=== Running improve ==="
        pr-agent --pr_url="$PR_URL" improve

      displayName: 'Run PR Agent (describe + review + improve)'
      env:
        # Maps variable group secrets to container environment
        # OPENAI_KEY is stored in pr-agent-secrets library group
        OPENAI_KEY: $(OPENAI_KEY)
        OPENAI_API_KEY: $(OPENAI_KEY)       # LiteLLM expects OPENAI_API_KEY
        OPENAI_API_BASE: $(OPENAI_API_BASE)
        # System.AccessToken allows PR Agent to post comments on PRs
        # Requires "Contribute to pull requests" permission on the repo
        azure_devops__pat: $(System.AccessToken)